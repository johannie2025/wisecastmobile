name: Build WiseCast Mobile APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/WiseCastMobile-debug.apk
          find app/build/outputs/apk/release/ -name "*.apk" \
               -exec cp {} artifacts/WiseCastMobile-release.apk \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WiseCastMobile-debug
          path: artifacts/WiseCastMobile-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WiseCastMobile-release
          path: artifacts/WiseCastMobile-release.apk
          retention-days: 30

      # Créer une GitHub Release quand on pousse un tag vX.Y.Z
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/WiseCastMobile-debug.apk
            artifacts/WiseCastMobile-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
